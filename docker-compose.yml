services:
  postgres:
    image: postgres:16-alpine
    container_name: secrets-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secrets_manager
      POSTGRES_USER: secrets_user
      POSTGRES_PASSWORD: secrets_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pkg/storage/schema.sql:/schema/schema.sql:ro
    command: >
      sh -c "
      docker-entrypoint.sh postgres &
      pid=$$!;
      until pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB; do sleep 1; done;
      psql -v ON_ERROR_STOP=1 -U $$POSTGRES_USER -d $$POSTGRES_DB -f /schema/schema.sql;
      wait $$pid
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secrets_user -d secrets_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
